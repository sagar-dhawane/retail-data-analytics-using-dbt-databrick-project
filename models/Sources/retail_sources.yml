sources:
  - name: retail_source
    database: dbt_project_catalog
    schema: retail_schema
    tables:
      - name: orders
        config:
          loaded_at_field: created_at
          freshness:
            warn_after:
              count: 365
              period: day
        # Generic Testings
        columns:
          - name: id
            data_tests:
              - not_null:
                  config:
                    severity: warn
              - unique:
                  config:
                    severity: warn
          - name: product_id
            data_tests:
              - unique: 
                  config:
                    severity: warn

      - name: reviews

      - name: products

      - name: users